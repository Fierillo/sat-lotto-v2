<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" fill="#0A1128"/>

  <g filter="url(#neon-glow)">
    <!-- Chest body -->
    <rect x="40" y="90" width="120" height="70" rx="8" fill="#8B4513" stroke="#FF6B00" stroke-width="3"/>
    
    <!-- Chest lid -->
    <path d="M 40 90 Q 100 50 160 90 L 160 90 L 40 90 Z" fill="#A0522D" stroke="#FF6B00" stroke-width="3"/>
    
    <!-- Chest lid top curve -->
    <path d="M 45 88 Q 100 55 155 88" fill="none" stroke="#FF6B00" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Metal bands -->
    <rect x="35" y="85" width="130" height="8" rx="2" fill="#FFD700" stroke="#FF6B00" stroke-width="2"/>
    <rect x="35" y="155" width="130" height="8" rx="2" fill="#FFD700" stroke="#FF6B00" stroke-width="2"/>
    
    <!-- Lock plate -->
    <rect x="85" y="95" width="30" height="25" rx="3" fill="#FFD700" stroke="#FF6B00" stroke-width="2"/>
    
    <!-- Keyhole -->
    <circle cx="100" cy="105" r="5" fill="#0A1128"/>
    <rect x="97" y="105" width="6" height="12" fill="#0A1128"/>
    
    <!-- Gems on chest -->
    <circle cx="60" cy="120" r="6" fill="#00FF9D" stroke="#FF6B00" stroke-width="2"/>
    <circle cx="140" cy="120" r="6" fill="#00FF9D" stroke="#FF6B00" stroke-width="2"/>
    <circle cx="100" cy="135" r="8" fill="#FF6B00" stroke="#FFD700" stroke-width="2"/>
    
    <!-- Glow effect on center gem -->
    <circle cx="100" cy="135" r="4" fill="#FFFFFF" opacity="0.6"/>
    
    <!-- Coins spilling out -->
    <circle cx="55" cy="75" r="8" fill="#FFD700" stroke="#FF6B00" stroke-width="2"/>
    <circle cx="70" cy="68" r="6" fill="#FFD700" stroke="#FF6B00" stroke-width="2"/>
    <circle cx="130" cy="70" r="7" fill="#FFD700" stroke="#FF6B00" stroke-width="2"/>
    <circle cx="145" cy="78" r="5" fill="#FFD700" stroke="#FF6B00" stroke-width="2"/>
    
    <!-- Sparkles -->
    <g fill="#FFFFFF">
      <circle cx="45" cy="60" r="2" opacity="0.8"/>
      <circle cx="155" cy="55" r="2" opacity="0.6"/>
      <circle cx="100" cy="45" r="3" opacity="0.9"/>
      <circle cx="80" cy="52" r="1.5" opacity="0.7"/>
      <circle cx="125" cy="48" r="1.5" opacity="0.8"/>
    </g>
  </g>
</svg>
