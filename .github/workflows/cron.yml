name: Round Announcer
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.VERCEL_SECRET }}" \
            "${{ vars.APP_URL }}/api/cron/process-round"